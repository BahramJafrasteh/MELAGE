name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write    # needed to upload assets to the release

jobs:
  # ── macOS (Apple Silicon + Intel) ────────────────────────────────────────
  build-macos:
    name: macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # M1/M2 — arm64
            arch: arm64
          - runner: macos-13   # Intel  — x86_64
            arch: x86_64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.10'
          auto-activate-base: true
          auto-update-conda: true

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -c conda-forge pyqt=5 -y
          pip install pyinstaller pillow antspyx
          pip install -e ".[bet]"

      - name: Convert icon to .icns
        shell: bash -l {0}
        run: python packaging/macos/make_icns.py

      - name: Build .app bundle
        shell: bash -l {0}
        run: pyinstaller melage.spec --noconfirm

      - name: Create .dmg
        shell: bash -l {0}
        run: |
          brew install create-dmg
          VERSION="${GITHUB_REF_NAME#v}"
          create-dmg \
            --volname "MELAGE ${VERSION}" \
            --volicon "assets/resource/main.icns" \
            --window-size 620 420 \
            --icon-size 120 \
            --icon "MELAGE.app" 160 200 \
            --hide-extension "MELAGE.app" \
            --app-drop-link 460 200 \
            "MELAGE-${VERSION}-macOS-${{ matrix.arch }}.dmg" \
            "dist/MELAGE.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: "MELAGE-*.dmg"

  # ── Windows x64 ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.10'
          auto-activate-base: true
          auto-update-conda: true

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -c conda-forge pyqt=5 -y
          pip install pyinstaller antspyx
          pip install -e ".[bet]"

      - name: Build Windows folder
        shell: bash -l {0}
        run: pyinstaller melage.spec --noconfirm

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=$version `
            packaging\windows\installer.iss

      - name: Rename installer with arch tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Move-Item dist\MELAGE-${version}-windows-setup.exe `
                    MELAGE-${version}-windows-setup.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "MELAGE-*-windows-setup.exe"

  # ── Attach all artifacts to the GitHub release ───────────────────────────
  upload-to-release:
    name: Upload to release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: installers/

      - name: List installers
        run: ls -lh installers/

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/*
